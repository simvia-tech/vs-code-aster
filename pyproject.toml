[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = true
warn_return_any = false
files = ["python/lsp"]

[[tool.mypy.overrides]]
module = ["asterstudy.*", "code_aster.*"]
ignore_errors = true
